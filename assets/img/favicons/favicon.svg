<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MK">
  <rect width="512" height="512" rx="96" fill="#0f2942"/>
  <!-- textLength: both letters fit horizontally. y + alphabetic baseline: rasterizers often ignore dominant-baseline=central; this centers cap height in the square. -->
  <text
    x="256"
    y="362"
    text-anchor="middle"
    dominant-baseline="alphabetic"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="300"
    font-weight="700"
    fill="#f5f5f0"
    textLength="400"
    lengthAdjust="spacingAndGlyphs">MK</text>
</svg>
